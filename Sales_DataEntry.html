<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกสถานะงาน - Sales Data Entry</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Prompt', 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 100%; /* ขยายเต็มหน้าจอ */
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .card {
            background: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #login-section {
            max-width: 450px;
            margin: 0 auto 1.5rem auto;
        }

        .preset-btn {
            padding: 0.375rem 1rem;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #475569;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .preset-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(37, 99, 235, 0.05);
        }

        .preset-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            table-layout: fixed;
            min-width: 800px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
            white-space: normal;
            word-wrap: break-word;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }
        
        .job-action button {
            background: #f1f5f9;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .job-action button:hover {
            background: var(--primary-color);
            color: white;
        }

        #jobs-container { display: none; }
        .spinner { display: none; text-align: center; padding: 2rem; color: var(--text-muted); }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
        }

        .modal-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-cancel {
            background: white;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            margin-top: 0.5rem;
        }
        .btn-cancel:hover { background: #f1f5f9; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>อัปเดตสถานะงานเซลล์</h1>
        <p style="color: var(--text-muted); margin-top: 0.25rem;">ระบบบันทึกงานหลุด/ปิดการขายเข้า Google Sheets</p>
    </div>

    <div class="card" id="login-section">
        <div class="form-group">
            <label>เลือกชื่อเซลล์ของคุณ</label>
            <select class="form-control" id="sale-select">
                <option value="">-- กำลังโหลดข้อมูล... --</option>
            </select>
        </div>
        <div class="form-group">
            <label>รหัสผ่าน</label>
            <input type="password" class="form-control" id="input-password" placeholder="ใส่รหัสผ่านของคุณ">
        </div>
        <button class="btn" id="btn-login" onclick="loadJobs()" disabled>เข้าสู่ระบบเพื่อดูงานของฉัน</button>
    </div>

    <div class="spinner" id="loading-spinner">กำลังโหลดข้อมูล...</div>

    <div id="jobs-container">
        <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: space-between;">
                <h2 style="margin: 0;" id="jobs-title">งานของฉัน</h2>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; justify-content: flex-end;">
                    <select id="status-filter" class="form-control" onchange="renderJobs()" style="width: auto; padding: 0.4rem 1rem; border-radius: 20px;">
                        <option value="">ทุกสถานะ</option>
                        <option value="ติดตั้งแล้ว">ติดตั้งแล้ว</option>
                        <option value="ปิดการขาย">ปิดการขาย</option>
                        <option value="ติดตาม">ติดตาม</option>
                        <option value="ไม่ติดตั้ง">ไม่ติดตั้ง</option>
                        <option value="งานหลุด">งานหลุด</option>
                        <option value="ยกเลิก">ยกเลิก</option>
                        <option value="เสนอราคา">เสนอราคา</option>
                        <option value="นัด">นัดดูหน้างาน / วัดพื้นที่</option>
                    </select>
                    <input type="text" id="search-input" class="form-control" placeholder="🔍 ค้นหา ชื่อลูกค้า, สถานที่..." oninput="renderJobs()" style="max-width: 250px; padding: 0.4rem 1rem; border-radius: 20px;">
                </div>
            </div>
            
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); align-items: center;">
                <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-right: 0.5rem;">📅 กรองวันที่:</span>
                <button class="preset-btn active" onclick="setPresetFilter('all', this)">ทั้งหมด</button>
                <button class="preset-btn" onclick="setPresetFilter('today', this)">วันนี้</button>
                <button class="preset-btn" onclick="setPresetFilter('yesterday', this)">เมื่อวาน</button>
                <button class="preset-btn" onclick="setPresetFilter('15days', this)">15 วัน</button>
                <button class="preset-btn" onclick="setPresetFilter('thisMonth', this)">เดือนนี้</button>
                <button class="preset-btn" onclick="setPresetFilter('lastMonth', this)">เดือนที่แล้ว</button>
                <button class="preset-btn" onclick="setPresetFilter('3months', this)">3 เดือน</button>
                
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-left: auto;">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">ระบุช่วงเวลา:</span>
                    <input type="date" class="form-control" id="filter-start" onchange="applyCustomRange()" style="width: auto; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-radius: 6px;">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">-</span>
                    <input type="date" class="form-control" id="filter-end" onchange="applyCustomRange()" style="width: auto; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-radius: 6px;">
                </div>
            </div>
        </div>
        
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 7%;">วันที่</th>
                        <th style="width: 8%;">บริษัท</th>
                        <th style="width: 7%;">ID</th>
                        <th style="width: 12%;">ชื่อลูกค้า</th>
                        <th style="width: 10%;">เบอร์โทร</th>
                        <th style="width: 8%;">ช่องทาง</th>
                        <th style="width: 8%;">ชื่อช่องทาง</th>
                        <th style="width: 12%;">สถานที่หน้างาน</th>
                        <th style="width: 7%;">พื้นที่ (ตร.ฟ.)</th>
                        <th style="width: 8%;">สถานะ</th>
                        <th style="width: 8%;">สาเหตุ</th>
                        <th style="width: 5%; text-align: center;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="jobs-list"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Update Modal -->
<div class="modal" id="update-modal">
    <div class="modal-content">
        <div class="modal-header">อัปเดตสถานะงาน</div>
        <div id="modal-job-name" style="margin-bottom: 1rem; font-weight: 500; color: var(--primary-color);"></div>
        
        <form id="update-form">
            <div class="form-group">
                <label>สถานะ</label>
                <select class="form-control" id="input-status" required>
                    <option value="">-- เลือกสถานะ --</option>
                    <option value="ปิดการขาย">ปิดการขาย</option>
                    <option value="งานหลุด">งานหลุด</option>
                    <option value="ไม่รับงาน">ไม่รับงาน</option>
                </select>
            </div>
            <div class="form-group">
                <label>วันที่อัปเดต</label>
                <input type="date" class="form-control" id="input-date" required>
            </div>
            <div class="form-group">
                <label>สาเหตุหลัก (เฉพาะกรณีงานหลุด)</label>
                <select class="form-control" id="input-reason">
                    <option value="">-- เลือกสาเหตุ --</option>
                    <option value="ราคาแพง">ราคาแพง / สู้ราคาไม่ได้</option>
                    <option value="ไปใช้ฟิล์มแบรนด์อื่น">ไปใช้ฟิล์มแบรนด์อื่น</option>
                    <option value="ติดต่อไม่ได้">ติดต่อไม่ได้ / เลื่อนไม่มีกำหนด</option>
                    <option value="สเปคไม่ตรง">สเปค/สีไม่ตรงความต้องการ</option>
                    <option value="เปลี่ยนใจไม่ติด">เปลี่ยนใจไม่ติดแล้ว</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>
            
            <button type="submit" class="btn" id="btn-submit">บันทึกข้อมูล</button>
            <button type="button" class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
        </form>
    </div>
</div>

<script>
    // ===== นำ WEB APP URL จาก Apps Script มาใส่ที่นี่ =====
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'; 

    // URL ของ Google Sheets (CSV) เพื่อใช้อ่านข้อมูลหลัก
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Ag7yh0SFSqGfm3LTNinHwlwV6h5Xa4M2yIuf03mq2uc/export?format=csv&gid=949197576';
    
    // URL ของ Google Sheets (CSV) สำหรับรหัสผ่าน (Tab: รหัสผ่าน)
    const PASSWORDS_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Ag7yh0SFSqGfm3LTNinHwlwV6h5Xa4M2yIuf03mq2uc/export?format=csv&gid=579789325';

    let globalData = [];
    let salePasswords = {}; // เก็บข้อมูลรหัสผ่านแบบ Dynamic
    let currentJob = null;
    let loggedInSaleName = '';

    // ป้องกัน Cache เพื่อให้ได้ข้อมูลใหม่ล่าสุดเสมอเมื่อเปิดเว็บ
    const fetchUrl = SHEET_CSV_URL + '&t=' + new Date().getTime();

    function parseThaiDate(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.trim().split('/');
        if (parts.length === 3) {
            const d = parseInt(parts[0], 10);
            const m = parseInt(parts[1], 10) - 1;
            let y = parseInt(parts[2], 10);
            if (y < 100) y += 2000;
            else if (y > 2400) y -= 543;
            return new Date(y, m, d);
        }
        return null;
    }

    function formatDateForInput(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // Load CSV
    Papa.parse(fetchUrl, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function(results) {
            const rawData = results.data;
            if (rawData.length < 4) {
                alert("ไม่พบข้อมูล หรือโหลดข้อมูลผิดพลาด");
                return;
            }

            // Extract Headers จากบรรทัดที่ 3 (index 2)
            const headers = rawData[2];
            
            let parsedData = [];
            for (let i = 3; i < rawData.length; i++) {
                let obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let headerName = headers[j];
                    if (!headerName) continue;
                    if (obj.hasOwnProperty(headerName)) {
                        headerName = headerName + '_' + j; // ป้องกันคอลัมน์ Sale ซ้ำกัน
                    }
                    obj[headerName] = rawData[i][j];
                }
                parsedData.push(obj);
            }
            globalData = parsedData;

            // Load Passwords
            Papa.parse(PASSWORDS_CSV_URL, {
                download: true,
                header: true,
                complete: function(res) {
                    res.data.forEach(row => {
                        const saleName = row['ฝ่ายขาย'] || row['Sale'] || Object.values(row)[0];
                        const password = row['รหัสผ่าน'] || row['Password'] || Object.values(row)[1];
                        if (saleName && password) {
                            salePasswords[String(saleName).trim()] = String(password).trim();
                        }
                    });
                    
                    updateSaleDropdown();
                    document.getElementById('btn-login').disabled = false;
                }
            });
        }
    });

    function updateSaleDropdown() {
        let saleSelect = document.getElementById('sale-select');
        
        // ดึงเฉพาะรายชื่อเซลล์ที่มีในชีต "รหัสผ่าน" เท่านั้น
        let salesSet = new Set(Object.keys(salePasswords));

        saleSelect.innerHTML = '<option value="">-- เลือกเซลล์ --</option>';
        Array.from(salesSet).sort().forEach(sale => {
            let opt = document.createElement('option');
            opt.value = sale;
            opt.textContent = sale;
            saleSelect.appendChild(opt);
        });
    }

    function setPresetFilter(type, btnElement) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        const today = new Date();
        let start = null;
        let end = null;

        if (type === 'today') {
            start = new Date(today);
            end = new Date(today);
        } else if (type === 'yesterday') {
            start = new Date(today);
            start.setDate(start.getDate() - 1);
            end = new Date(start);
        } else if (type === '15days') {
            start = new Date(today);
            start.setDate(start.getDate() - 15);
            end = new Date(today);
        } else if (type === 'thisMonth') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        } else if (type === 'lastMonth') {
            start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            end = new Date(today.getFullYear(), today.getMonth(), 0);
        } else if (type === '3months') {
            start = new Date(today.getFullYear(), today.getMonth() - 2, 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        }

        if (start && end) {
            document.getElementById('filter-start').value = formatDateForInput(start);
            document.getElementById('filter-end').value = formatDateForInput(end);
        } else {
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
        }

        renderJobs();
    }

    function applyCustomRange() {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        renderJobs();
    }

    function loadJobs() {
        const saleName = document.getElementById('sale-select').value;
        const passwordInput = document.getElementById('input-password').value.trim();

        if(!saleName) {
            Swal.fire('แจ้งเตือน', 'กรุณาเลือกชื่อเซลล์ก่อนครับ', 'warning');
            return;
        }

        const correctPassword = salePasswords[saleName];
        if (correctPassword && passwordInput !== correctPassword) {
            Swal.fire('รหัสผ่านไม่ถูกต้อง', 'กรุณาตรวจสอบรหัสผ่านอีกครั้งครับ', 'error');
            return;
        } else if (!correctPassword && passwordInput !== saleName) {
            Swal.fire('รหัสผ่านไม่ถูกต้อง', 'กรุณาตรวจสอบรหัสผ่านอีกครั้งครับ', 'error');
            return;
        }
        
        loggedInSaleName = saleName;
        document.getElementById('jobs-title').innerText = 'งานของฉัน (' + saleName + ')';
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading-spinner').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('jobs-container').style.display = 'block';
            
            setPresetFilter('thisMonth', document.querySelector('.preset-btn[onclick*="thisMonth"]'));
        }, 500);
    }

    function renderJobs() {
        if (!loggedInSaleName) return;

        const startVal = document.getElementById('filter-start').value;
        const endVal = document.getElementById('filter-end').value;
        const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
        const statusFilter = document.getElementById('status-filter').value;
        
        let sDate = startVal ? new Date(startVal) : null;
        if(sDate) sDate.setHours(0,0,0,0);
        let eDate = endVal ? new Date(endVal) : null;
        if(eDate) eDate.setHours(23,59,59,999);

        const myJobs = globalData.filter(row => {
            const rowSale = row['Sale_26'] ? String(row['Sale_26']).trim() : '';
            if (rowSale !== loggedInSaleName) return false;

            // Date Filter
            if (sDate || eDate) {
                let rowDateObj = parseThaiDate(row['วันที่'] || '');
                if (!rowDateObj) return false;
                if (sDate && rowDateObj < sDate) return false;
                if (eDate && rowDateObj > eDate) return false;
            }

            // Status Filter
            if (statusFilter) {
                const currentStatus = row['สถานะ'] ? row['สถานะ'].trim() : '';
                if (!currentStatus.includes(statusFilter)) return false;
            }

            // Search Filter
            if (searchQuery) {
                const searchStr = `${row['ชื่อลูกค้า'] || ''} ${row['สถานที่หน้างาน'] || ''}`.toLowerCase();
                if (!searchStr.includes(searchQuery)) return false;
            }

            return true;
        });

        const listContainer = document.getElementById('jobs-list');
        listContainer.innerHTML = '';

        if(myJobs.length === 0) {
            listContainer.innerHTML = '<tr><td colspan="12" style="color: var(--text-muted); text-align: center; padding: 2rem;">ไม่พบข้อมูลงานในช่วงเวลา/คำค้นหานี้ครับ 🎉</td></tr>';
        } else {
            myJobs.sort((a, b) => {
                let da = parseThaiDate(a['วันที่'] || '');
                let db = parseThaiDate(b['วันที่'] || '');
                if(!da && !db) return 0;
                if(!da) return 1;
                if(!db) return -1;
                return db.getTime() - da.getTime();
            });

            myJobs.forEach(job => {
                const date = job['วันที่'] || '-';
                const company = job['บริษัท'] || '-';
                const jobId = job['ID'] || '-';
                const custName = job['ชื่อลูกค้า'] || 'ไม่ระบุชื่อ';
                const phone = job['เบอร์โทร'] || '-';
                const channel = job['ช่องทาง'] || '-';
                const channelName = job['ชื่อช่องทาง'] || '-';
                const location = job['สถานที่หน้างาน'] || '-';
                const area = job['พื้นที่'] || '-';
                const currentStatus = job['สถานะ'] ? job['สถานะ'].trim() : '-';
                const reason = job['สาเหตุ'] || '-';
                
                let statusColor = '#3b82f6'; // Default (Blue)
                if (currentStatus.includes('ติดตั้งแล้ว') || currentStatus === 'ปิดการขาย') statusColor = '#10b981'; // Green
                else if (currentStatus.includes('ไม่ติดตั้ง') || currentStatus === 'งานหลุด' || currentStatus === 'ไม่รับงาน') statusColor = '#ef4444'; // Red
                else if (currentStatus.includes('ยกเลิก')) statusColor = '#64748b'; // Grey
                else if (currentStatus.includes('ติดตาม')) statusColor = '#eab308'; // Yellow
                else if (currentStatus.includes('นัด') || currentStatus.includes('วัดพื้นที่')) statusColor = '#8b5cf6'; // Purple

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td>${company}</td>
                    <td>${jobId}</td>
                    <td style="font-weight: 500;">${custName}</td>
                    <td>${phone}</td>
                    <td>${channel}</td>
                    <td>${channelName}</td>
                    <td style="font-size: 0.85rem;">${location}</td>
                    <td>${area}</td>
                    <td><span style="font-size: 0.8rem; background: ${statusColor}; color: white; padding: 4px 10px; border-radius: 12px; white-space: nowrap;">${currentStatus}</span></td>
                    <td style="font-size: 0.85rem; color: #ef4444;">${reason}</td>
                    <td style="text-align: center;" class="job-action">
                        <button onclick="openModal('${encodeURIComponent(custName)}', '${encodeURIComponent(loggedInSaleName)}', '${encodeURIComponent(location)}')">อัปเดต</button>
                    </td>
                `;
                listContainer.appendChild(tr);
            });
        }
    }

    function openModal(encCust, encSale, encLoc) {
        if(GAS_WEB_APP_URL === 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec') {
            Swal.fire('ยังไม่ได้ตั้งค่า', 'รบกวนนำ Web App URL ของ Apps Script มาใส่ในไฟล์ HTML บรรทัดที่ 162 ก่อนครับ', 'info');
            return;
        }

        currentJob = {
            customerName: decodeURIComponent(encCust),
            saleRep: decodeURIComponent(encSale),
            location: decodeURIComponent(encLoc)
        };

        document.getElementById('modal-job-name').innerText = currentJob.customerName;
        document.getElementById('input-status').value = '';
        document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('input-reason').value = '';
        
        document.getElementById('update-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('update-modal').classList.remove('active');
        currentJob = null;
    }

    document.getElementById('update-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const status = document.getElementById('input-status').value;
        const dateStr = document.getElementById('input-date').value; // yyyy-mm-dd
        const reason = document.getElementById('input-reason').value;

        if((status === 'งานหลุด' || status === 'ไม่รับงาน') && !reason) {
            Swal.fire('แจ้งเตือน', 'กรุณาระบุสาเหตุหลักของงานหลุดด้วยครับ', 'warning');
            return;
        }

        const parts = dateStr.split('-');
        const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        
        const thaiMonths = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        const monthIndex = parseInt(parts[1]) - 1;
        const year543 = parseInt(parts[0]) + 543;
        const formattedMonth = `${thaiMonths[monthIndex]} ${year543.toString().slice(-2)}`;

        const payload = {
            customerName: currentJob.customerName,
            saleRep: currentJob.saleRep,
            location: currentJob.location,
            status: status,
            date: formattedDate,
            month: formattedMonth,
            reason: reason
        };

        Swal.fire({
            title: 'กำลังบันทึก...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => {
                    closeModal();
                    renderJobs();
                });
            } else {
                Swal.fire('เกิดข้อผิดพลาด', data.message || 'บันทึกไม่สำเร็จ', 'error');
            }
        })
        .catch(err => {
            Swal.fire('เกิดข้อผิดพลาด', err.toString(), 'error');
        });

    });

</script>
</body>
</html>
